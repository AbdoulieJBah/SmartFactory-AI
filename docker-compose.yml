services:
  database:
    image: postgres:16
    container_name: smartfactory_db
    restart: always
    environment:
      POSTGRES_DB: smartfactory
      POSTGRES_USER: smartfactory_user
      POSTGRES_PASSWORD: smartfactory_password
    ports:
      - "5432:5432"
    volumes:
      - smartfactory_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: smartfactory_backend
    restart: always
    depends_on:
      - database
    environment:
      DATABASE_URL: postgresql://smartfactory_user:smartfactory_password@database:5432/smartfactory
      SECRET_KEY: change-this-secret-key-before-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: smartfactory_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  smartfactory_postgres_data: